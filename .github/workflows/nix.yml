name: Nix
on:
  push:
    paths-ignore:
      - README.md
  pull_request:
    paths-ignore:
      - README.md

jobs:
  # formatting (treefmt check output) + evaluates every nixosConfiguration
  flake-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          # cache the store (flake inputs, eval deps) keyed on the lockfile
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
      - run: nix flake check --accept-flake-config

  # per-host eval so a broken host is visible at a glance in the PR checks;
  # eval of the toplevel drvPath is equivalent to the old dry-run build
  eval-host:
    strategy:
      fail-fast: false
      matrix:
        target-system:
          - apollo
          - ares
          - artemis
          - harmonica
          - harmonica-encrypted
          - harmonica-sd
          - iso
          - pochita
          - pochita-sd
          - tartarus
          - wallfacer
          - ymir
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: nix-community/cache-nix-action@v7
        with:
          # one shared cache for all hosts; jobs with an exact-key hit skip saving
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
      - run: nix eval --accept-flake-config --raw .#nixosConfigurations.${{ matrix.target-system }}.config.system.build.toplevel.drvPath
